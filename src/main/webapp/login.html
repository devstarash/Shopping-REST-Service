<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Магазин</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --white: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-light: #a1a1a6;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --danger: #ff3b30;
            --success: #34c759;
            --border: #d2d2d7;
            --border-light: #e8e8ed;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.1);
            --shadow-lg: 0 24px 64px rgba(0,0,0,0.12);
            --radius: 18px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 1px solid var(--border-light);
            background: rgba(245,245,247,0.85);
            backdrop-filter: blur(20px);
        }

        .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 500; color: var(--text); text-decoration: none; }
        .nav-back { font-size: 0.8rem; color: var(--text-light); text-decoration: none; transition: color 0.15s; }
        .nav-back:hover { color: var(--accent); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-wrap {
            background: var(--white);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header { margin-bottom: 32px; }

        .form-emoji { font-size: 2rem; margin-bottom: 12px; display: block; }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .form-sub { font-size: 0.85rem; color: var(--text-secondary); }

        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

        .field label { font-size: 0.78rem; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.3px; }

        .field input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text);
            transition: all 0.15s;
            outline: none;
        }
        .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.1); }
        .field input.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(255,59,48,0.1); }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 16px rgba(0,113,227,0.3);
        }
        .submit-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,113,227,0.4); }
        .submit-btn:disabled { background: var(--border); color: var(--text-light); box-shadow: none; transform: none; cursor: not-allowed; }

        .error-msg {
            font-size: 0.78rem;
            color: var(--danger);
            min-height: 20px;
            margin-top: 8px;
            text-align: center;
        }

        .form-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.82rem;
            color: var(--text-light);
        }
        .form-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .form-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav>
    <a href="/index.html" class="nav-logo">Магазин</a>
    <a href="/auth.html" class="nav-back">← Назад</a>
</nav>

<main>
    <div class="form-wrap">
        <div class="form-header">
            <span class="form-emoji">👋</span>
            <h1 class="form-title">Вход</h1>
            <p class="form-sub">Рады видеть вас снова</p>
        </div>

        <div class="field">
            <label>Логин</label>
            <input type="text" id="username" placeholder="ivan_ivanov" autocomplete="username">
        </div>

        <div class="field">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="submit-btn" id="submitBtn" onclick="doLogin()">Войти</button>
        <div class="error-msg" id="errorMsg"></div>

        <div class="form-footer">
            Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
        </div>
    </div>
</main>

<script>
    // если уже залогинен — редирект
    fetch('/auth/me').then(r => {
        if (r.ok) window.location.href = '/index.html';
    });

    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const btn = document.getElementById('submitBtn');

        errorMsg.textContent = '';

        if (!username || !password) {
            errorMsg.textContent = 'Заполните все поля';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Входим...';

        try {
            const r = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (r.ok) {
                window.location.href = '/index.html';
            } else {
                const err = await r.json().catch(() => ({}));
                errorMsg.textContent = err.message || 'Неверный логин или пароль';
                document.getElementById('password').classList.add('error');
            }
        } catch (e) {
            errorMsg.textContent = 'Нет соединения с сервером';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Войти';
        }
    }
</script>
</body>
</html>
