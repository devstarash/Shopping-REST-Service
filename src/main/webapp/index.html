<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --white: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-light: #a1a1a6;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --danger: #ff3b30;
            --border: #d2d2d7;
            --border-light: #e8e8ed;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.1);
            --shadow-lg: 0 24px 64px rgba(0,0,0,0.12);
            --radius: 18px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(245,245,247,0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border-light);
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: var(--text);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .cart-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 8px 16px 8px 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 12px rgba(0,113,227,0.3);
        }
        .cart-pill:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(0,113,227,0.4);
            transform: translateY(-1px);
        }

        .cart-icon { font-size: 1rem; }

        .cart-badge {
            background: white;
            color: var(--accent);
            border-radius: 50%;
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* HERO */
        .hero {
            padding: 100px 32px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero-label {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.4rem, 5vw, 4rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -1px;
            color: var(--text);
            margin-bottom: 12px;
        }

        .hero-title em {
            font-style: italic;
            color: var(--text-secondary);
        }

        .hero-sub {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* CATEGORIES */
        .categories-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px 24px;
        }

        .categories-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 4px;
        }
        .categories-scroll::-webkit-scrollbar { display: none; }

        .cat-chip {
            background: var(--white);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 100px;
            padding: 7px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 400;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.18s;
            box-shadow: var(--shadow-sm);
        }
        .cat-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .cat-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 2px 12px rgba(0,113,227,0.25);
        }

        /* PRODUCTS */
        .products-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px 80px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .product-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            border: 1px solid transparent;
            animation: fadeUp 0.4s ease both;
            cursor: default;
        }
        .product-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-3px);
            border-color: var(--border-light);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-emoji {
            font-size: 2.4rem;
            margin-bottom: 16px;
            display: block;
        }

        .product-cat-tag {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.3;
            color: var(--text);
            margin-bottom: 6px;
        }

        .product-stock-line {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-bottom: 20px;
            font-weight: 400;
        }
        .product-stock-line.low { color: var(--danger); }

        .product-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
        }

        .product-price {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        /* ADD BUTTON */
        .add-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.18s;
            line-height: 1;
        }
        .add-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(0,113,227,0.3);
        }
        .add-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* CARD QTY CONTROLS */
        .card-qty {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg);
            border-radius: 100px;
            padding: 3px;
            border: 1px solid var(--border-light);
        }

        .card-qty-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none;
            background: var(--white);
            color: var(--text);
            font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: var(--shadow-sm);
            line-height: 1;
        }
        .card-qty-btn:hover {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 8px rgba(0,113,227,0.3);
        }

        .card-qty-num {
            font-size: 0.88rem;
            font-weight: 500;
            min-width: 20px;
            text-align: center;
            color: var(--text);
        }

        /* STATES */
        .state-box {
            grid-column: 1/-1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 12px;
            text-align: center;
        }
        .state-icon { font-size: 3rem; opacity: 0.25; }
        .state-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* CART DRAWER */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .overlay.open { opacity: 1; pointer-events: all; }

        .drawer {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: 400px;
            background: var(--white);
            z-index: 201;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            box-shadow: var(--shadow-lg);
        }
        .overlay.open .drawer { transform: translateX(0); }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 24px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .drawer-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: -0.3px;
        }

        .drawer-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--bg);
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .drawer-close:hover { background: var(--border-light); color: var(--text); }

        .drawer-items {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .drawer-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 10px;
            color: var(--text-light);
            font-size: 0.82rem;
        }
        .drawer-empty-icon { font-size: 2.5rem; opacity: 0.2; }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            animation: fadeUp 0.25s ease both;
        }

        .cart-item-emoji { font-size: 1.6rem; }

        .cart-item-info { flex: 1; min-width: 0; }
        .cart-item-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cart-item-price {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .qty-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .qty-btn {
            width: 26px; height: 26px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            line-height: 1;
        }
        .qty-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
        .qty-num { font-size: 0.82rem; font-weight: 500; min-width: 18px; text-align: center; }

        .drawer-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .total-label { font-size: 0.82rem; color: var(--text-secondary); }
        .total-amount {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: -0.5px;
        }

        .checkout-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(0,113,227,0.3);
        }
        .checkout-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 20px rgba(0,113,227,0.4);
            transform: translateY(-1px);
        }
        .checkout-btn:disabled {
            background: var(--border);
            color: var(--text-light);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* RECEIPT MODAL */
        .modal-bg {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            padding: 20px;
        }
        .modal-bg.open { opacity: 1; pointer-events: all; }

        .receipt-card {
            background: var(--white);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            transform: scale(0.94) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .modal-bg.open .receipt-card { transform: scale(1) translateY(0); }

        .receipt-top {
            padding: 32px 28px 24px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
        }

        .receipt-check {
            width: 56px; height: 56px;
            background: #34c759;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 1.6rem;
            box-shadow: 0 8px 24px rgba(52,199,89,0.3);
        }

        .receipt-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .receipt-meta {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .receipt-items { padding: 16px 28px; }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 0;
            border-bottom: 1px solid var(--border-light);
        }
        .receipt-row:last-child { border-bottom: none; }

        .receipt-row-left { flex: 1; }
        .receipt-row-name { font-size: 0.85rem; font-weight: 400; margin-bottom: 2px; }
        .receipt-row-qty { font-size: 0.72rem; color: var(--text-secondary); }
        .receipt-row-price {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 500;
        }

        .receipt-total {
            margin: 0 28px 24px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .receipt-total-label { font-size: 0.82rem; color: var(--text-secondary); }
        .receipt-total-amount {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
        }

        .receipt-close-btn {
            width: calc(100% - 56px);
            margin: 0 28px 28px;
            background: var(--bg);
            border: none;
            border-radius: 100px;
            padding: 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }
        .receipt-close-btn:hover { background: var(--border-light); color: var(--text); }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--text);
            color: white;
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 400;
            z-index: 400;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            box-shadow: var(--shadow-md);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--danger); }
        .toast.success { background: #34c759; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">Магазин</div>
    <div class="nav-right">

        <div id="userInfo" style="display:none;align-items:center;gap:10px">
            <span id="userName" style="font-size:0.82rem;color:var(--text-secondary)"></span>
            <button onclick="logout()" style="background:none;border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:0.78rem;color:var(--text-secondary);cursor:pointer">Выйти</button>
        </div>

        <a href="/auth.html" id="loginBtn" style="display:none;background:none;border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:0.78rem;color:var(--text-secondary);text-decoration:none">Войти</a>

        <button class="cart-pill" onclick="toggleCart()">
            <span class="cart-icon">🛒</span>
            Корзина
            <span class="cart-badge" id="cartCount">0</span>
        </button>
    </div>
</nav>

<div class="hero">
    <div class="hero-label">Добро пожаловать</div>
    <h1 class="hero-title">Свежие продукты,<br><em>каждый день</em></h1>
    <p class="hero-sub" id="heroSub">Загрузка каталога...</p>
</div>

<div class="categories-wrap">
    <div class="categories-scroll" id="categoriesScroll">
        <button class="cat-chip active" onclick="filterCategory(null, this)">Все товары</button>
    </div>
</div>

<div class="products-wrap">
    <div class="products-grid" id="productsGrid">
        <div class="state-box">
            <div class="state-icon">⏳</div>
            <div class="state-text">Загружаем товары...</div>
        </div>
    </div>
</div>

<!-- CART DRAWER -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
    <div class="drawer">
        <div class="drawer-header">
            <div class="drawer-title">Корзина</div>
            <button class="drawer-close" onclick="toggleCart()">✕</button>
        </div>
        <div class="drawer-items" id="drawerItems">
            <div class="drawer-empty">
                <div class="drawer-empty-icon">🛒</div>
                <span>Корзина пуста</span>
            </div>
        </div>
        <div class="drawer-footer">
            <div id="authNotice" style="display:none;background:rgba(0,113,227,0.06);border:1px solid rgba(0,113,227,0.15);border-radius:10px;padding:12px 16px;font-size:0.8rem;color:var(--text-secondary);text-align:center;line-height:1.6">
                Войдите чтобы оформить заказ — <a href="/login.html" style="color:var(--accent);text-decoration:none;font-weight:500">войти</a> или <a href="/register.html" style="color:var(--accent);text-decoration:none;font-weight:500">зарегистрироваться</a>
            </div>
            <div class="total-row">
                <span class="total-label">Итого</span>
                <span class="total-amount" id="totalAmount">0 ₽</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" disabled>
                Оформить заказ
            </button>
        </div>
    </div>
</div>

<!-- RECEIPT MODAL -->
<div class="modal-bg" id="modalBg">
    <div class="receipt-card">
        <div class="receipt-top">
            <div class="receipt-check">✓</div>
            <div class="receipt-title">Покупка оформлена</div>
            <div class="receipt-meta" id="receiptMeta"></div>
        </div>
        <div class="receipt-items" id="receiptItems"></div>
        <div class="receipt-total">
            <span class="receipt-total-label">Итого оплачено</span>
            <span class="receipt-total-amount" id="receiptTotal"></span>
        </div>
        <button class="receipt-close-btn" onclick="closeReceipt()">Закрыть</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const BASE_URL = 'http://localhost:8080';
    const EMOJIS = { default:'🛍️', 1:'🥛', 2:'🍞', 3:'🧃', 4:'🥦', 5:'🥩' };

    let cart = {};
    let products = [];
    let currentCategory = null;
    let currentUser = null;

    function getEmoji(categoryId) {
        return EMOJIS[categoryId] || EMOJIS.default;
    }

    // ── API ──────────────────────────────────────────
    async function fetchCategories() {
        const r = await fetch(`${BASE_URL}/categories`);
        return r.json();
    }

    async function fetchProducts(categoryId = null) {
        const url = categoryId
            ? `${BASE_URL}/products?categoryId=${categoryId}`
            : `${BASE_URL}/products`;
        const r = await fetch(url);
        return r.json();
    }

    async function postPurchase(items) {
        const r = await fetch(`${BASE_URL}/purchases`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ items })
        });
        if (!r.ok) throw new Error(await r.text());
        return r.json();
    }

    // ── INIT ─────────────────────────────────────────
    async function checkAuth() {
        try {
            const r = await fetch('/auth/me');
            if (r.ok) {
                currentUser = await r.json();
                document.getElementById('userName').textContent = `Привет, ${currentUser.firstName}`;
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('loginBtn').style.display = 'none';
            } else {
                currentUser = null;
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('loginBtn').style.display = 'block';
            }
        } catch (e) {
            currentUser = null;
            document.getElementById('loginBtn').style.display = 'block';
        }
    }

    async function logout() {
        await fetch('/auth/logout', { method: 'POST' });
        currentUser = null;
        document.getElementById('userInfo').style.display = 'none';
        document.getElementById('loginBtn').style.display = 'block';
        showToast('Вы вышли из системы', 'success');
        updateCartUI();
    }

    async function init() {
        await checkAuth();
        try {
            const [cats, prods] = await Promise.all([fetchCategories(), fetchProducts()]);
            products = prods;
            renderCategories(cats);
            renderProducts(prods);
            document.getElementById('heroSub').textContent =
                `${prods.length} товаров · ${cats.length} категорий`;
        } catch (e) {
            document.getElementById('productsGrid').innerHTML = `
        <div class="state-box">
          <div class="state-icon">⚠️</div>
          <div class="state-text" style="color:var(--danger)">
            Нет соединения с сервером<br>
            <small style="color:var(--text-light)">${BASE_URL}</small>
          </div>
        </div>`;
            document.getElementById('heroSub').textContent = 'Ошибка загрузки';
        }
    }

    // ── RENDER ───────────────────────────────────────
    function renderCategories(cats) {
        const scroll = document.getElementById('categoriesScroll');
        cats.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'cat-chip';
            btn.textContent = c.name;
            btn.onclick = () => filterCategory(c.id, btn);
            scroll.appendChild(btn);
        });
    }

    function renderProducts(prods) {
        const grid = document.getElementById('productsGrid');
        if (!prods.length) {
            grid.innerHTML = `<div class="state-box"><div class="state-icon">📦</div><div class="state-text">Товары не найдены</div></div>`;
            return;
        }
        grid.innerHTML = prods.map((p, i) => `
      <div class="product-card" style="animation-delay:${i * 0.05}s" id="card-${p.id}">
        <span class="product-emoji">${getEmoji(p.category?.id)}</span>
        <div class="product-cat-tag">${p.category?.name || '—'}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-stock-line ${p.stock < 5 ? 'low' : ''}">
          ${p.stock === 0 ? 'Нет в наличии' : p.stock < 5 ? `Осталось ${p.stock} шт.` : `В наличии: ${p.stock} шт.`}
        </div>
        <div class="product-bottom">
          <div class="product-price">${formatPrice(p.price)}</div>
          <div id="ctrl-${p.id}">${renderCardControl(p)}</div>
        </div>
      </div>
    `).join('');
    }

    function renderCardControl(p) {
        const qty = cart[p.id]?.quantity || 0;
        if (p.stock === 0) {
            return `<button class="add-btn" disabled title="Нет в наличии">+</button>`;
        }
        if (qty === 0) {
            return `<button class="add-btn" onclick="addToCart(${p.id})">+</button>`;
        }
        return `
      <div class="card-qty">
        <button class="card-qty-btn" onclick="cartQty(${p.id}, -1)">−</button>
        <span class="card-qty-num">${qty}</span>
        <button class="card-qty-btn" onclick="cartQty(${p.id}, 1)">+</button>
      </div>`;
    }

    function updateCardControl(productId) {
        const product = products.find(p => p.id === productId);
        const ctrl = document.getElementById(`ctrl-${productId}`);
        if (ctrl && product) ctrl.innerHTML = renderCardControl(product);
    }

    async function filterCategory(categoryId, btn) {
        currentCategory = categoryId;
        document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('productsGrid').innerHTML = `
      <div class="state-box"><div class="state-icon">⏳</div><div class="state-text">Загрузка...</div></div>`;
        try {
            products = await fetchProducts(categoryId);
            renderProducts(products);
        } catch (e) {
            showToast('Ошибка загрузки', 'error');
        }
    }

    // ── CART ─────────────────────────────────────────
    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        cart[productId] = { product, quantity: 1 };
        updateCartUI();
        updateCardControl(productId);
        showToast(`${product.name} добавлен`, 'success');
    }

    function cartQty(productId, delta) {
        const product = products.find(p => p.id === productId);
        if (!cart[productId]) return;
        const newQty = cart[productId].quantity + delta;
        if (newQty <= 0) {
            delete cart[productId];
        } else if (product && newQty > product.stock) {
            showToast(`Максимум ${product.stock} шт.`, 'error');
            return;
        } else {
            cart[productId].quantity = newQty;
        }
        updateCartUI();
        updateCardControl(productId);
    }

    function updateQty(productId, delta) {
        cartQty(productId, delta);
    }

    function updateCartUI() {
        const items = Object.values(cart);
        const count = items.reduce((s, i) => s + i.quantity, 0);
        const total = items.reduce((s, i) => s + i.product.price * i.quantity, 0);

        document.getElementById('cartCount').textContent = count;
        document.getElementById('totalAmount').textContent = formatPrice(total);
        const isLoggedIn = currentUser !== null;
        const hasItems = items.length > 0;
        document.getElementById('authNotice').style.display = (!isLoggedIn && hasItems) ? 'block' : 'none';
        document.getElementById('checkoutBtn').disabled = !isLoggedIn || !hasItems;

        const el = document.getElementById('drawerItems');
        if (!items.length) {
            el.innerHTML = `
        <div class="drawer-empty">
          <div class="drawer-empty-icon">🛒</div>
          <span>Корзина пуста</span>
        </div>`;
            return;
        }
        el.innerHTML = items.map(({ product, quantity }) => `
      <div class="cart-item">
        <div class="cart-item-emoji">${getEmoji(product.category?.id)}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${product.name}</div>
          <div class="cart-item-price">${formatPrice(product.price)} × ${quantity} = ${formatPrice(product.price * quantity)}</div>
        </div>
        <div class="qty-row">
          <button class="qty-btn" onclick="updateQty(${product.id}, -1)">−</button>
          <span class="qty-num">${quantity}</span>
          <button class="qty-btn" onclick="updateQty(${product.id}, 1)">+</button>
        </div>
      </div>
    `).join('');
    }

    function toggleCart() {
        document.getElementById('overlay').classList.toggle('open');
    }

    function handleOverlay(e) {
        if (e.target === document.getElementById('overlay')) toggleCart();
    }

    // ── CHECKOUT ─────────────────────────────────────
    async function checkout() {
        if (!currentUser) {
            window.location.href = '/auth.html';
            return;
        }
        const items = Object.entries(cart).map(([id, { quantity }]) => ({
            productId: parseInt(id), quantity
        }));

        const btn = document.getElementById('checkoutBtn');
        btn.disabled = true;
        btn.textContent = 'Оформляем...';

        try {
            const receipt = await postPurchase(items);
            cart = {};
            updateCartUI();
            toggleCart();
            showReceipt(receipt);
            products = await fetchProducts(currentCategory);
            renderProducts(products);
        } catch (e) {
            showToast('Ошибка оформления', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Оформить заказ';
        }
    }

    // ── RECEIPT ──────────────────────────────────────
    function showReceipt(receipt) {
        const date = new Date(receipt.saleDate);
        document.getElementById('receiptMeta').textContent =
            `Чек №${receipt.receiptId} · ${date.toLocaleDateString('ru')} в ${date.toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'})}`;

        document.getElementById('receiptItems').innerHTML = receipt.items.map(item => `
      <div class="receipt-row">
        <div class="receipt-row-left">
          <div class="receipt-row-name">${item.productName}</div>
          <div class="receipt-row-qty">${formatPrice(item.priceEach)} × ${item.quantity}</div>
        </div>
        <div class="receipt-row-price">${formatPrice(item.itemTotal || item.priceEach * item.quantity)}</div>
      </div>
    `).join('');

        document.getElementById('receiptTotal').textContent = formatPrice(receipt.total);
        document.getElementById('modalBg').classList.add('open');
    }

    function closeReceipt() {
        document.getElementById('modalBg').classList.remove('open');
    }

    // ── TOAST ────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── UTILS ────────────────────────────────────────
    function formatPrice(n) {
        return Number(n).toLocaleString('ru', { minimumFractionDigits: 2 }) + ' ₽';
    }

    init();
</script>
</body>
</html>
