<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель — Магазин</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --white: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-light: #a1a1a6;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --danger: #ff3b30;
            --success: #34c759;
            --warning: #ff9f0a;
            --border: #d2d2d7;
            --border-light: #e8e8ed;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.1);
            --shadow-lg: 0 24px 64px rgba(0,0,0,0.12);
            --radius: 18px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Блок загрузки при проверке прав */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            font-size: 1.2rem;
            color: var(--text-secondary);
            transition: opacity 0.3s;
        }

        /* MAIN APP */
        .app { display: none; }
        .app.visible { display: block; }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(245,245,247,0.85);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border-light);
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text);
            text-decoration: none;
        }

        .nav-badge {
            background: var(--accent);
            color: white;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 7px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }
        .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* PAGE */
        .page {
            padding-top: 80px;
            max-width: 1100px;
            margin: 0 auto;
            padding-left: 32px;
            padding-right: 32px;
            padding-bottom: 80px;
        }

        .page-header {
            padding: 40px 0 32px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 32px;
        }

        .page-label {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 400;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .page-title em {
            font-style: italic;
            color: var(--text-secondary);
        }

        /* DATE PICKER */
        .date-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .date-label {
            font-size: 0.82rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .date-input {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            color: var(--text);
            outline: none;
            transition: all 0.15s;
            box-shadow: var(--shadow-sm);
        }
        .date-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
        }

        .load-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 10px 24px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 12px rgba(0,113,227,0.25);
        }
        .load-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,113,227,0.35);
        }
        .load-btn:disabled {
            background: var(--border);
            color: var(--text-light);
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }

        /* STATS CARDS */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow-sm);
            border: 1px solid transparent;
            transition: all 0.25s;
            animation: fadeUp 0.4s ease both;
        }
        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            border-color: var(--border-light);
        }

        .stat-icon {
            font-size: 1.8rem;
            margin-bottom: 16px;
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .stat-value.accent { color: var(--accent); }
        .stat-value.success { color: var(--success); }

        /* TABLE */
        .table-section {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            animation: fadeUp 0.4s ease 0.1s both;
        }

        .table-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .table-count {
            font-size: 0.78rem;
            color: var(--text-light);
            background: var(--bg);
            padding: 4px 10px;
            border-radius: 100px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: var(--bg);
        }

        th {
            padding: 12px 24px;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        td {
            padding: 14px 24px;
            font-size: 0.88rem;
            border-bottom: 1px solid var(--border-light);
            font-weight: 300;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(0,113,227,0.02); }

        .rank-cell {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 400;
            width: 40px;
        }

        .rank-1 { color: var(--warning); }
        .rank-2 { color: var(--text-secondary); }
        .rank-3 { color: #a0522d; }

        .qty-pill {
            display: inline-flex;
            align-items: center;
            background: rgba(0,113,227,0.08);
            color: var(--accent);
            border-radius: 100px;
            padding: 3px 10px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        /* BAR CHART */
        .bar-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .bar-bg {
            flex: 1;
            height: 6px;
            background: var(--border-light);
            border-radius: 100px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #34aadc);
            border-radius: 100px;
            transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
        }

        /* EMPTY / LOADING */
        .state-box {
            padding: 60px 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .state-icon { font-size: 2.5rem; opacity: 0.2; }
        .state-text { font-size: 0.85rem; color: var(--text-secondary); }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--text);
            color: white;
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 0.8rem;
            z-index: 400;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            box-shadow: var(--shadow-md);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--danger); }
        .toast.success { background: var(--success); }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    Проверка доступа...
</div>

<div class="app" id="app">
    <nav>
        <div class="nav-left">
            <a href="/index.html" class="nav-logo">Магазин</a>
            <span class="nav-badge">ADMIN</span>
        </div>
        <button class="logout-btn" onclick="logout()">Выйти</button>
    </nav>

    <div class="page">
        <div class="page-header">
            <div class="page-label">Аналитика продаж</div>
            <h1 class="page-title">Отчёты <em>магазина</em></h1>
        </div>

        <div class="date-section">
            <span class="date-label">Выберите дату</span>
            <input type="date" class="date-input" id="dateInput">
            <button class="load-btn" id="loadBtn" onclick="loadData()">Загрузить отчёт</button>
        </div>

        <div class="stats-row" id="statsRow" style="display:none">
            <div class="stat-card">
                <span class="stat-icon">💰</span>
                <div class="stat-label">Выручка за день</div>
                <div class="stat-value accent" id="revenueVal">—</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">📦</span>
                <div class="stat-label">Наименований продано</div>
                <div class="stat-value success" id="itemsCountVal">—</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">🏆</span>
                <div class="stat-label">Лидер продаж</div>
                <div class="stat-value" id="topProductVal" style="font-size:1.1rem">—</div>
            </div>
        </div>

        <div class="table-section" id="tableSection">
            <div class="state-box">
                <div class="state-icon">📅</div>
                <div class="state-text">Выберите дату и нажмите «Загрузить отчёт»</div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const BASE_URL = '';
    let currentData = [];

    // Инициализация страницы
    checkAdminAuth();

    // ── AUTH CHECK ───────────────────────────────────
    async function checkAdminAuth() {
        try {
            // Спрашиваем у UserController текущего юзера в сессии
            const r = await fetch(`${BASE_URL}/auth/me`);
            if (r.ok) {
                const user = await r.json();
                // Проверяем роль (переводим в верхний регистр на всякий случай)
                if (user.role && user.role.toUpperCase() === 'ADMIN') {
                    // Всё супер, скрываем экран загрузки и показываем админку
                    document.getElementById('loadingScreen').style.opacity = '0';
                    setTimeout(() => document.getElementById('loadingScreen').remove(), 300);

                    document.getElementById('app').classList.add('visible');
                    document.getElementById('dateInput').value = getTodayDate();
                    return;
                }
            }
            // Если не авторизован или роль не ADMIN — выкидываем на страницу логина
            window.location.href = '/login.html';
        } catch (e) {
            console.error(e);
            window.location.href = '/login.html';
        }
    }

    async function logout() {
        try {
            // Вызываем твой метод logout бэкенда для очистки сессии
            await fetch(`${BASE_URL}/auth/logout`, { method: 'POST' });
        } catch (e) {
            console.error('Ошибка при выходе:', e);
        }
        window.location.href = '/login.html';
    }

    // ── DATA LOADING ─────────────────────────────────
    async function loadData() {
        const date = document.getElementById('dateInput').value;
        if (!date) { showToast('Выберите дату', 'error'); return; }

        const btn = document.getElementById('loadBtn');
        btn.disabled = true;
        btn.textContent = 'Загрузка...';

        try {
            // Больше никаких Headers с авторизацией, бэкенд сам всё поймёт по сессионной куке!
            const [revenueRes, soldRes] = await Promise.all([
                fetch(`${BASE_URL}/admin/reports/revenue?date=${date}`),
                fetch(`${BASE_URL}/admin/reports/sold?date=${date}`)
            ]);

            if (revenueRes.status === 401 || soldRes.status === 401 || revenueRes.status === 403) {
                showToast('Сессия истекла или недостаточно прав', 'error');
                setTimeout(() => window.location.href = '/login.html', 1500);
                return;
            }

            const revenue = await revenueRes.json();
            const sold = await soldRes.json();
            currentData = sold;

            renderStats(revenue, sold);
            renderTable(sold, date);

        } catch (e) {
            showToast('Ошибка загрузки данных', 'error');
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Загрузить отчёт';
        }
    }

    function renderStats(revenue, sold) {
        document.getElementById('statsRow').style.display = 'grid';
        document.getElementById('revenueVal').textContent = formatPrice(revenue);
        document.getElementById('itemsCountVal').textContent = sold.length + ' шт.';
        document.getElementById('topProductVal').textContent =
            sold.length > 0 ? sold[0].productName : '—';
    }

    function renderTable(sold, date) {
        const section = document.getElementById('tableSection');

        if (!sold.length) {
            section.innerHTML = `
        <div class="state-box">
          <div class="state-icon">🔍</div>
          <div class="state-text">Продаж за ${formatDate(date)} не найдено</div>
        </div>`;
            return;
        }

        const maxQty = Math.max(...sold.map(i => i.totalSold));

        section.innerHTML = `
      <div class="table-header">
        <div class="table-title">Продажи за ${formatDate(date)}</div>
        <span class="table-count">${sold.length} позиций</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Товар</th>
            <th>Продано</th>
            <th style="min-width:200px">Доля</th>
          </tr>
        </thead>
        <tbody>
          ${sold.map((item, i) => `
            <tr>
              <td class="rank-cell rank-${i+1}">${i + 1}</td>
              <td>${item.productName}</td>
              <td><span class="qty-pill">${item.totalSold} шт.</span></td>
              <td>
                <div class="bar-wrap">
                  <div class="bar-bg">
                    <div class="bar-fill" style="width: ${maxQty > 0 ? Math.round(item.totalSold / maxQty * 100) : 0}%"></div>
                  </div>
                  <span style="font-size:0.72rem;color:var(--text-light);min-width:30px">
                    ${maxQty > 0 ? Math.round(item.totalSold / maxQty * 100) : 0}%
                  </span>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    }

    // ── UTILS ────────────────────────────────────────
    function getTodayDate() {
        return new Date().toISOString().split('T')[0];
    }

    function formatDate(dateStr) {
        return new Date(dateStr).toLocaleDateString('ru', {
            day: 'numeric', month: 'long', year: 'numeric'
        });
    }

    function formatPrice(n) {
        return Number(n).toLocaleString('ru', { minimumFractionDigits: 2 }) + ' ₽';
    }

    let toastTimer;
    function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }
</script>
</body>
</html>
